<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <title>VivaFest | Login</title>
  <script src="https://cdn.tailwindcss.com"></script>
</head>

<body class="bg-cover bg-center bg-fixed"
style="background-image: url('https://images.unsplash.com/photo-1497032628192-86f99bcd76bc?q=80&w=2070&auto=format&fit=crop');">

  <div class="min-h-screen bg-gradient-to-br from-purple-900/80 via-indigo-900/80 to-black/80 backdrop-blur-sm text-white flex flex-col">


    <nav class="flex justify-between items-center px-10 py-6 bg-white/10 backdrop-blur-xl border-b border-white/20">
      <h1 class="text-2xl font-bold">VivaFest 🎉</h1>

      <ul class="hidden md:flex space-x-8 font-medium">
        <li><a href="index.html" class="hover:text-pink-400 transition">Home</a></li>
        <li><a href="about.html" class="hover:text-pink-400 transition">About</a></li>
        <li><a href="consultants.html" class="hover:text-pink-400 transition">Consultants</a></li>
        <li><a href="upcoming.html" class="hover:text-pink-400 transition">Upcoming Events</a></li>
        <li><a href="tickets.html" class="hover:text-pink-400 transition">Tickets & Prices</a></li>
        <li><a href="themes.html" class="hover:text-pink-400 transition">Themes</a></li>
        <li><a href="contact.html" class="hover:text-pink-400 transition">Contact</a></li>
        <li><a href="login.html" class="text-pink-400">Login</a></li>
      </ul>
    </nav>
    <div class="flex flex-grow items-center justify-center px-6">

      <div class="bg-white/10 backdrop-blur-xl p-10 rounded-2xl border border-white/20 shadow-2xl w-full max-w-md">

        <h2 class="text-3xl font-bold text-center mb-8">Welcome Back 👋</h2>

        <form class="space-y-6">

          <div>
            <label class="block mb-2 text-white/80">Email Address</label>
            <input type="email"
              class="w-full px-4 py-3 rounded-lg bg-white/20 border border-white/30 focus:outline-none focus:ring-2 focus:ring-pink-400">
          </div>

          <div>
            <label class="block mb-2 text-white/80">Password</label>
            <input type="password"
              class="w-full px-4 py-3 rounded-lg bg-white/20 border border-white/30 focus:outline-none focus:ring-2 focus:ring-pink-400">
          </div>

          <div class="flex justify-between items-center text-sm text-white/70">
            <label class="flex items-center space-x-2">
              <input type="checkbox" class="accent-pink-500">
              <span>Remember me</span>
            </label>

            <a href="#" class="hover:text-pink-400 transition">Forgot Password?</a>
          </div>

          <button
            class="w-full bg-pink-500 hover:bg-pink-600 py-3 rounded-lg font-semibold transition">
            Login
          </button>

        </form>

        <p class="text-center text-white/70 mt-6">
          Don’t have an account?
          <a href="#" class="text-pink-400 hover:underline">Sign Up</a>
        </p>

      </div>

    </div>

    <footer class="bg-white/10 backdrop-blur-xl border-t border-white/20 text-center py-6 text-white/70">
      © 2026 VivaFest. All Rights Reserved.
    </footer>

  </div>

</body>
</html>
